<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Job Requisition (JR) — Thai Wah</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1D2B6B;--sky:#29B5E8;--sky2:#EAF8FE;--off:#F4F7FD;--text:#12183A;--muted:#657199;--border:#D7E1F2;--white:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#F6FBFF 0%,#F4F7FD 35%,#EFF4FB 100%);font-family:Inter,sans-serif;color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1360px;margin:0 auto;padding:24px 20px 36px}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:4px}
h1{font-family:Kanit,sans-serif;font-size:36px;line-height:1.05;color:var(--navy);font-weight:800;margin-bottom:4px}
.sub{color:var(--muted);font-size:15px;margin-bottom:8px}
.note-box{background:var(--sky2);border-left:3px solid var(--sky);border-radius:0 8px 8px 0;padding:10px 14px;font-size:14px;color:#005588;line-height:1.65;margin-bottom:20px}
.lang-wrap{position:relative;flex-shrink:0}
.lang-btn{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:9px 14px;cursor:pointer;font-family:Kanit,sans-serif;font-weight:700;font-size:13px;color:var(--navy);box-shadow:0 4px 12px rgba(29,43,107,.07);white-space:nowrap}
.lang-btn:hover{border-color:var(--sky)}
.lang-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(29,43,107,.12);z-index:100;overflow:hidden;min-width:180px}
.lang-dropdown.open{display:block}
.lang-opt{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--navy)}
.lang-opt:hover{background:var(--sky2)}
.lang-opt.active{background:#EEF3FF;font-weight:800}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 16px}
.tab{border:1px solid var(--border);background:var(--white);color:var(--navy);padding:12px 18px;border-radius:14px;font-weight:800;font-family:Kanit,sans-serif;font-size:14px;cursor:pointer;box-shadow:0 8px 24px rgba(29,43,107,.05);transition:.2s;text-align:left}
.tab .tsub{display:block;font-size:11px;font-weight:600;opacity:.7;margin-top:2px;font-family:Inter,sans-serif}
.tab:hover{transform:translateY(-1px)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.panel{display:none;background:rgba(255,255,255,.88);border:1px solid var(--border);border-radius:22px;overflow:hidden;box-shadow:0 16px 36px rgba(29,43,107,.08)}
.panel.active{display:block}
.topbar{height:4px;background:linear-gradient(90deg,var(--sky),var(--navy),var(--sky));background-size:200%;animation:bar 3s linear infinite}
@keyframes bar{0%{background-position:0%}100%{background-position:200%}}
.panel-body{padding:22px}
.hero{background:linear-gradient(180deg,#fff,#F8FBFF);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.hero h2{font-family:Kanit,sans-serif;font-size:20px;color:var(--navy);margin-bottom:12px}
.flow-diagram{display:flex;align-items:center;flex-wrap:wrap;padding:18px 10px;background:#fff;border-radius:12px;border:1px solid var(--border)}
.fd-node{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:90px;position:relative}
.fd-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.fd-label{font-size:10.5px;font-weight:700;color:var(--navy);text-align:center;line-height:1.3;font-family:Kanit,sans-serif;white-space:pre-line}
.fd-arrow{color:var(--muted);font-size:18px;padding:0 2px;align-self:center;margin-bottom:24px}
.fd-asterisk{position:absolute;top:-7px;right:calc(50% - 8px);width:14px;height:14px;border-radius:50%;background:#F59E0B;color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.helper{margin-top:10px;color:var(--muted);font-size:13px;font-weight:600}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:14px}
.sum-card{border-radius:12px;padding:13px}
.toggle-btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-family:Kanit,sans-serif;font-size:12px;font-weight:700;color:var(--navy);background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;transition:all .2s;margin-bottom:14px}
.pov-label{display:inline-flex;align-items:center;gap:8px;font-family:Kanit,sans-serif;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:14px}
.subprocess-badge{display:flex;align-items:center;gap:10px;background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:10px;padding:10px 14px;margin-bottom:12px}
.subprocess-text{font-size:12px;color:#92400E;line-height:1.5}
.subprocess-text strong{font-family:Kanit,sans-serif;font-weight:700;display:block;margin-bottom:2px}
.flow-body{max-height:3000px;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:1}
.flow-body.collapsed{max-height:0;opacity:0}
.cf-row{display:flex;overflow-x:auto;padding-bottom:.5rem;flex-wrap:nowrap;align-items:flex-start}
.cf-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;min-width:148px;flex-shrink:0;cursor:pointer;transition:all .2s;overflow:visible;margin-right:8px;position:relative}
.cf-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.cf-band{padding:7px 11px;display:flex;align-items:center;justify-content:space-between;border-radius:10px 10px 0 0;overflow:hidden}
.cf-band-role{font-size:10.5px;font-weight:700;font-family:Kanit,sans-serif}
.cf-band-num{font-size:13px;font-weight:800;font-family:Kanit,sans-serif}
.cf-body{padding:.7rem .85rem .85rem;border-radius:0 0 10px 10px}
.cf-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.35;font-family:Kanit,sans-serif}
.cf-asterisk{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:#F59E0B;color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);z-index:2}
.cf-arrow{display:flex;align-items:center;flex-shrink:0;padding:0 2px;color:var(--muted);font-size:20px;margin-bottom:1.5rem;align-self:center}
.route-div{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--muted);font-family:Kanit,sans-serif;margin:1rem 0}
.route-div::before,.route-div::after{content:'';flex:1;height:1.5px;background:var(--border)}
.route-div span{background:var(--off);padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);white-space:nowrap;color:var(--navy)}
.asterisk-note{margin-top:16px;padding:10px 14px;background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:10px;font-size:13px;color:#92400E;line-height:1.6}
.overview-note{margin-top:12px;padding:10px 14px;background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:10px;font-size:13px;color:#92400E;line-height:1.6}
.detail-wrap{margin-top:18px;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);gap:18px;animation:pop .22s ease both}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.shotbox,.textbox{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 10px 24px rgba(29,43,107,.05)}
.detail-ss{border-radius:10px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;margin-bottom:10px}
.detail-ss img{width:100%;display:block;max-height:220px;object-fit:cover;object-position:top;transition:max-height .35s ease}
.detail-ss img.exp{max-height:600px}
.detail-ss-bar{font-size:9.5px;color:var(--muted);padding:4px 10px;background:var(--off);border-top:1px solid var(--border);font-weight:700;font-family:Kanit,sans-serif;display:flex;justify-content:space-between}
.no-ss{background:#F8FAFF;border-radius:10px;min-height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;font-weight:600;border:1px solid var(--border)}
.stepnum{font-family:Kanit,sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.textbox h3{font-family:Kanit,sans-serif;font-size:28px;line-height:1.1;color:var(--navy);margin-bottom:10px}
.textbox .desc{font-size:18px;line-height:1.75;color:var(--text);margin-bottom:14px}
.textbox ul{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.textbox ul li{font-size:17px;color:#455080;line-height:1.6;padding-left:1.5rem;position:relative}
.textbox ul li::before{content:'';position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--navy);display:inline-block}
.tip-box{background:var(--sky2);border:1px solid #b3e0f5;border-radius:10px;padding:12px 15px;font-size:16px;color:#005588;font-weight:600;margin-top:12px}
.tip-box::before{content:"💡 "}

.success-final{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px}
.success-final img{width:88px;height:auto;display:block}
.success-final .success-text{font-size:20px;font-weight:800;color:#16A34A;text-align:center;line-height:1.2}
.success-final-wrap{margin-top:18px;display:grid;grid-template-columns:1fr;gap:18px;animation:pop .22s ease both}
.success-final-wrap .textbox{max-width:760px;margin:0 auto;text-align:center}
.success-final-wrap .textbox ul{display:inline-flex;flex-direction:column;align-items:flex-start;text-align:left}

@media(max-width:700px){.detail-wrap{grid-template-columns:1fr}.fd-arrow{display:none}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div>
      <p id="eyebrow" style="font-family:Kanit,sans-serif;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px"></p>
      <h1 id="pg-title"></h1>
      <div class="sub" id="pg-sub"></div>
    </div>
    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">
        <span>🌐</span><span id="langLabel">English</span><span id="langArrow">▾</span>
      </button>
      <div class="lang-dropdown" id="langMenu"></div>
    </div>
  </div>
  <div class="note-box"><strong id="prereq-label"></strong> <span id="prereq-text"></span></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

function t(k){return(T[lang]&&T[lang][k])||T.en[k]||k;}
function ts(sk,f){return(T[lang].shared[sk]&&T[lang].shared[sk][f]!==undefined)?T[lang].shared[sk][f]:T.en.shared[sk][f];}

function buildLangMenu(){
  document.getElementById('langMenu').innerHTML=LANGS.map(l=>
    `<div class="lang-opt${l===lang?' active':''}" onclick="setLang('${l}')">${LANG_NAMES[l]}</div>`
  ).join('');
}
function toggleLangMenu(){
  const m=document.getElementById('langMenu'),a=document.getElementById('langArrow');
  m.classList.toggle('open');a.textContent=m.classList.contains('open')?'▴':'▾';
}
function setLang(l){
  lang=l;localStorage.setItem('jr_lang',l);
  document.getElementById('langMenu').classList.remove('open');
  document.getElementById('langArrow').textContent='▾';
  cur={f1:null,f2:null,f3:null};renderAll();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-wrap')){
    document.getElementById('langMenu').classList.remove('open');
    document.getElementById('langArrow').textContent='▾';
  }
});

function card(flow,idx,key,isComplete=false,isSubprocess=false){
  const rc=ROLE_COLOURS[key];
  const hasAsterisk=ASTERISK_STEPS.has(key);
  const border=isComplete?'border-color:#10B981':isSubprocess?'border-color:#F59E0B;opacity:.85':'';
  const titleStyle=isComplete?'style="color:#065F46"':'';
  const badge=hasAsterisk?'<div class="cf-asterisk">✶</div>':'';
  return `<div class="cf-card" id="${flow}-c${idx}" onclick="sel('${flow}',${idx})" style="position:relative;${border}">
    ${badge}
    <div class="cf-band" style="background:${rc.bg}">
      <span class="cf-band-role" style="color:${rc.tc}">${ts(key,'role')}</span>
      <span class="cf-band-num" style="color:${rc.tc}">${isComplete?'✓':idx+1}</span>
    </div>
    <div class="cf-body"><div class="cf-title" ${titleStyle}>${ts(key,'title')}</div></div>
  </div>`;

function sel(flow,i){
  const key=FLOW_STEPS[flow][i];
  const d=document.getElementById('detail-'+flow);
  const total=FLOW_STEPS[flow].length;
  const accent=STEP_ACCENT[key];
  for(let j=0;j<total;j++){const c=document.getElementById(flow+'-c'+j);if(c){c.style.borderColor='';c.style.boxShadow='';}}
  const last=document.getElementById(flow+'-c'+(total-1));
  if(last)last.style.borderColor='#10B981';
  if(cur[flow]===i){d.innerHTML='';cur[flow]=null;return;}
  cur[flow]=i;
  const el=document.getElementById(flow+'-c'+i);
  if(el){el.style.borderColor=accent;el.style.boxShadow=accent+'44 0 4px 16px';}
  const ss=(ts(key,'ss')||[]).map(([k,lbl])=>{
    if(!SS[k])return'';
    return`<div class="detail-ss" onclick="this.querySelector('img').classList.toggle('exp')">
      <img src="${SS[k]}" alt="">
      <div class="detail-ss-bar"><span>${lbl}</span><span>${t('expand')}</span></div>
    </div>`;
  }).join('');
  const pts=(ts(key,'pts')||[]).map(p=>`<li>${p}</li>`).join('');
  const note=ts(key,'note')?`<div class="tip-box">${ts(key,'note')}</div>`:'';
  if(key==='complete'){
  d.innerHTML=`<div class="success-final-wrap">
    <div class="textbox">
      <div class="stepnum" style="color:${accent}">${t('step_label')} ${i+1} · ${ts(key,'role')}</div>
      <h3>${ts(key,'title')}</h3>
      <div class="success-final">
        ${SUCCESS_IMG ? `<img src="${SUCCESS_IMG}" alt="Process Successfully Completed">` : `<div class="success-text">✓</div>`}
        <div class="success-text">${ts(key,'title')}</div>
      </div>
      <p class="desc">${ts(key,'desc')}</p>
      <ul>${pts}</ul>${note}
    </div>
  </div>`;
} else {
  d.innerHTML=`<div class="detail-wrap">
    <div class="shotbox">${ss||`<div class="no-ss">${t('no_ss')}</div>`}</div>
    <div class="textbox">
      <div class="stepnum" style="color:${accent}">${t('step_label')} ${i+1} · ${ts(key,'role')}</div>
      <h3>${ts(key,'title')}</h3>
      <p class="desc">${ts(key,'desc')}</p>
      <ul>${pts}</ul>${note}
    </div>
  </div>`;
}
  setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function buildOverview(){
  const fd=t('fd');
  const icons=['📋','📝','👁️','🎯','📢','🎉'];
  const bgs=['#D1FAE5','#D1FAE5','#DBEAFE','#EDE9FE','#EDE9FE','#D1FAE5'];
  const fdr=[fd[0],fd[1],fd[2],fd[4],fd[5],fd[6]];
  let nodes='';
  for(let i=0;i<3;i++){
    nodes+=`<div class="fd-node"><div class="fd-icon" style="background:${bgs[i]}">${icons[i]}</div><div class="fd-label">${fdr[i]}</div></div><div class="fd-arrow">›</div>`;
  }
  nodes+=`<div class="fd-node"><div class="fd-asterisk">✶</div><div class="fd-icon" style="background:#FEF3C7">✅</div><div class="fd-label">${t('l1_label')}</div></div>`;
  nodes+='<div class="fd-arrow">›</div>';
  for(let i=3;i<6;i++){
    nodes+=`<div class="fd-node"><div class="fd-icon" style="background:${bgs[i]}">${icons[i]}</div><div class="fd-label">${fdr[i]}</div></div>${i<5?'<div class="fd-arrow">›</div>':''}`;
  }
  return`<div class="hero">
    <h2>${t('overview_title')}</h2>
    <div class="flow-diagram">${nodes}</div>
    <div class="helper">${t('overview_hint')}</div>
    <div class="overview-note">${t('overview_asterisk_note')}</div>
  </div>
  <div class="summary-grid">
    <div class="sum-card" style="background:#D1FAE5;border:1px solid #6EE7B7">
      <div style="font-family:Kanit,sans-serif;font-weight:800;color:#065F46;margin-bottom:5px">${t('sum1_title')}</div>
      <div style="font-size:13px;color:#047857">${t('sum1_body')}</div>

      <div style="font-size:13px;color:#047857">${t('sum2_body')}</div>
    </div>
    <div class="sum-card" style="background:#FEF9C3;border:1px solid #FCD34D">
      <div style="font-family:Kanit,sans-serif;font-weight:800;color:#92400E;margin-bottom:5px">${t('sum3_title')}</div>
      <div style="font-size:13px;color:#78350F">${t('sum3_body')}</div>
    </div>
  </div>`;
}

    `<button class="tab${f===currentFlow?' active':''}" onclick="switchTab('${f}')">
      ${t('tab_'+f)}<span class="tsub">${t('sub_'+f)}</span>
    </button>`).join('');
}

function switchTab(f){currentFlow=f;renderAll();}

function renderPanels(){
  document.getElementById('panels').innerHTML=FLOW_ORDER.map(f=>{
    const active=f===currentFlow?' active':'';
    if(f==='overview')return`<section class="panel${active}"><div class="topbar"></div><div class="panel-body">${buildOverview()}</div></section>`;
    const bid='fb_'+f;
    const ht=t('hide_flow'),st=t('show_flow');
    return`<section class="panel${active}">
      <div class="topbar"></div>
      <div class="panel-body">
        <button class="toggle-btn" onclick="(function(b,btn){b.classList.toggle('collapsed');btn.textContent=b.classList.contains('collapsed')?'${st}':'${ht}'})(document.getElementById('${bid}'),this)">${ht}</button>
        <div class="flow-body" id="${bid}">${flowHTML(f)}</div>
      </div>
    </section>`;
  }).join('');
}

function renderAll(){renderHeader();renderTabs();renderPanels();}
renderAll();
</script>
</body>
</html>
